<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="800" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- main branching network -->
  <g stroke="url(#g1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
    <path d="M80 120 L180 120 L250 180 L340 180 L410 250 L520 250" />
    <path d="M340 180 L340 100 L430 40 L560 40" />
    <path d="M340 180 L340 290 L430 360 L560 360" />
    <path d="M520 250 L620 250 L700 180" />
    <path d="M520 250 L620 250 L700 320" />

    <path d="M160 420 L250 420 L320 500 L430 500" />
    <path d="M320 500 L320 610 L420 690 L560 690" />
    <path d="M320 500 L320 390 L420 310 L560 310" />
    <path d="M430 500 L530 500 L620 570" />
    <path d="M430 500 L530 500 L620 440" />

    <path d="M70 650 L180 650 L260 580 L340 580 L420 640 L520 640" />
    <path d="M340 580 L340 500" />
    <path d="M180 650 L180 730 L260 770" />
  </g>

  <!-- connector nodes -->
  <g fill="#22c55e">
    <circle cx="80" cy="120" r="3"/>
    <circle cx="180" cy="120" r="3"/>
    <circle cx="250" cy="180" r="3"/>
    <circle cx="340" cy="180" r="6"/>
    <circle cx="410" cy="250" r="3"/>
    <circle cx="520" cy="250" r="6"/>
    <circle cx="430" cy="40" r="3"/>
    <circle cx="560" cy="40" r="3"/>
    <circle cx="430" cy="360" r="3"/>
    <circle cx="560" cy="360" r="3"/>
    <circle cx="700" cy="180" r="3"/>
    <circle cx="700" cy="320" r="3"/>

    <circle cx="160" cy="420" r="3"/>
    <circle cx="250" cy="420" r="3"/>
    <circle cx="320" cy="500" r="6"/>
    <circle cx="430" cy="500" r="6"/>
    <circle cx="420" cy="690" r="3"/>
    <circle cx="560" cy="690" r="3"/>
    <circle cx="420" cy="310" r="3"/>
    <circle cx="560" cy="310" r="3"/>
    <circle cx="620" cy="570" r="3"/>
    <circle cx="620" cy="440" r="3"/>

    <circle cx="70" cy="650" r="3"/>
    <circle cx="180" cy="650" r="6"/>
    <circle cx="340" cy="580" r="6"/>
    <circle cx="420" cy="640" r="3"/>
    <circle cx="520" cy="640" r="3"/>
    <circle cx="180" cy="730" r="3"/>
    <circle cx="260" cy="770" r="3"/>
  </g>

  <!-- faint secondary micro-branches -->
  <g stroke="#22c55e" stroke-opacity="0.08" stroke-width="1.4" stroke-linecap="round">
    <path d="M560 40 L640 90 L730 90" />
    <path d="M560 360 L640 410 L730 410" />
    <path d="M620 570 L700 620 L760 620" />
    <path d="M620 440 L700 470 L760 470" />
    <path d="M520 640 L600 700 L690 700" />
  </g>

  <g fill="#22c55e" fill-opacity="0.18">
    <circle cx="730" cy="90" r="3"/>
    <circle cx="730" cy="410" r="3"/>
    <circle cx="760" cy="620" r="3"/>
    <circle cx="760" cy="470" r="3"/>
    <circle cx="690" cy="700" r="3"/>
  </g>
</svg>
